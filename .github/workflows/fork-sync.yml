name: Sync Fork

on:
  workflow_dispatch: # on button click
    inputs:
      branch:
        description: 'Brach: '
        required: true
        default: main
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v2.0
        with:
          token: ${{ github.token }}
          repo: Visual-Code-Space
          owner: scto
          base: ${{ github.event.inputs.branch }}
          head: ${{ github.event.inputs.branch }}
          merge_method:	merge
