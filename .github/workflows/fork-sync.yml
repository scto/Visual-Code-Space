name: Sync Fork

on:
  workflow_dispatch: # on button click
  schedule:
    #- cron: '*/30 * * * *' # every 30 minutes
    - cron: '0 0-24/2 * * *' #At minute 0 past every 2nd hour from 0 through 24
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v2.0
        with:
          token: ${{ github.token }}
          repo: Visual-Code-Space
          owner: scto
          base: main
          head: main
          merge_method:	merge
