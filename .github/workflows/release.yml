name: Release Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4.0.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permission to executable
        run: chmod +x gradlew

      - name: Build with gradle
        uses: gradle/gradle-build-action@v2.11.1
        with:
          gradle-version: nightly
          arguments: assembleRelease

      - name: Upload release apks
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a
          path: app/build/outputs/apk/dev/release/app-dev-arm64-v8a-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a
          path: app/build/outputs/apk/dev/release/app-dev-armeabi-v7a-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-x86
          path: app/build/outputs/apk/dev/release/app-dev-x86-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-x86_64
          path: app/build/outputs/apk/dev/release/app-dev-x86_64-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-universal
          path: app/build/outputs/apk/dev/release/app-dev-universal-release.apk
